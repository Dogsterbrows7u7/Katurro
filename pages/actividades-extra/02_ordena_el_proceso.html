<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proceso: Ordena el Café - Katurro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #FFF2DC;
      color: #4A1513;
      font-family: 'Poppins', Arial, sans-serif;
    }

    .katurro-top {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 0;
    }

    .volver-actividades {
      display: inline-block;
      text-decoration: none;
      background: #7B1E1E;
      color: #fff;
      padding: 10px 18px;
      border-radius: 14px;
      font-weight: 800;
      box-shadow: 0 6px 14px rgba(74, 21, 19, 0.18);
      transition: 0.25s ease;
    }

    .volver-actividades:hover {
      background: #4A1513;
      color: #fff;
      transform: translateY(-2px);
    }

    .titulo-actividad-individual {
      text-align: center;
      margin: 24px auto 8px;
    }

    .titulo-actividad-individual span {
      color: #D8A45F;
      font-size: 0.85rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .titulo-actividad-individual h1 {
      font-family: 'Playfair Display', serif;
      color: #4A1513;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      margin: 8px 0 0;
    }

    main.container {
      max-width: 1100px;
      padding-bottom: 50px;
    }
  </style>
</head>
<body>
  <div class="katurro-top">
    <a class="volver-actividades" href="../actividades.html">← Volver a Actividades</a>

    <div class="titulo-actividad-individual">
      <span>Actividad interactiva</span>
      <h1>Proceso: Ordena el Café</h1>
    </div>
  </div>

  <main class="container my-5">
<style>
.ak-section{margin-top:4rem;padding:2.3rem;border-radius:28px;background:linear-gradient(135deg,#FBEED7,#FFF8EA);box-shadow:0 12px 30px rgba(74,21,19,.18);border:2px solid rgba(111,29,27,.18);font-family:'Poppins',Arial,sans-serif;color:#4A1513}
.ak-section h2{font-family:'Playfair Display',serif;font-weight:800;color:#4A1513;font-size:2.25rem;text-align:center}
.ak-section p{line-height:1.6}
.ak-intro{text-align:center;max-width:820px;margin:0 auto 1.6rem;color:#5f4b3f}
.ak-card{background:#fff;border-radius:22px;padding:1.4rem;border-left:8px solid #6F1D1B}
.ak-code{background:#24110f;color:#ffe9bf;padding:1rem;border-radius:14px;overflow-x:auto;border:2px solid #6F1D1B}
.ak-btn{background:#6F1D1B;color:#fff;border:none;border-radius:13px;padding:.8rem 1rem;font-weight:800;cursor:pointer;margin:.3rem}
.ak-btn:hover{background:#4A1513;transform:translateY(-1px)}
.ak-option{background:#FBEED7;color:#4A1513;border:2px solid #D8B982;border-radius:13px;padding:.8rem;margin:.35rem;font-weight:750;cursor:pointer;text-align:left}
.ak-option:hover{background:#f3d7a7}
.ak-option.correct{background:#9be7a0;border-color:#237a2a}
.ak-option.wrong{background:#ffb3b3;border-color:#a01818}
.ak-feedback{margin-top:1rem;background:#FFF8EA;border-radius:14px;padding:1rem;font-weight:800;color:#4A1513;min-height:40px}
.ak-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.ak-box{background:#fff;border:2px solid #E4C79B;border-radius:18px;padding:1rem;min-height:170px}
.ak-chip{display:inline-block;background:#FFF8EA;border:2px solid #D8B982;border-radius:12px;padding:.65rem .8rem;margin:.35rem;font-weight:800;cursor:pointer}
.ak-chip:hover{background:#f3d7a7}
@media(max-width:768px){.ak-grid{grid-template-columns:1fr}.ak-section{padding:1.3rem}.ak-section h2{font-size:1.7rem}}
</style>

<section class="ak-section" id="ordena-proceso-cafe">
  <h2>🌱 Ordena el proceso del café</h2>
  <p class="ak-intro">Haz clic en las etapas en el orden correcto. Si te equivocas, reinicia.</p>
  <div class="ak-grid">
    <div class="ak-box"><h3>Etapas disponibles</h3><div id="ak2Banco"></div></div>
    <div class="ak-box"><h3>Orden elegido</h3><div id="ak2Orden"></div></div>
  </div>
  <button class="ak-btn" id="ak2Revisar">Revisar orden</button>
  <button class="ak-btn" id="ak2Reset">Reiniciar</button>
  <div class="ak-feedback" id="ak2Feedback">Selecciona las etapas para comenzar.</div>
</section>
<script>
(function(){
const ok=["Siembra","Cultivo","Cosecha","Lavado","Secado","Tostión","Molienda","Taza final"];
let banco=[],orden=[];
const b=document.getElementById("ak2Banco"),o=document.getElementById("ak2Orden"),fb=document.getElementById("ak2Feedback");
function init(){banco=[...ok].sort(()=>Math.random()-.5);orden=[];render();fb.textContent="Selecciona las etapas para comenzar."}
function render(){b.innerHTML="";o.innerHTML="";banco.forEach((x,i)=>{let d=document.createElement("div");d.className="ak-chip";d.textContent=x;d.onclick=()=>{orden.push(x);banco.splice(i,1);render()};b.appendChild(d)});orden.forEach((x,i)=>{let d=document.createElement("div");d.className="ak-chip";d.textContent=(i+1)+". "+x;d.onclick=()=>{banco.push(x);orden.splice(i,1);render()};o.appendChild(d)});}
document.getElementById("ak2Revisar").onclick=()=>{if(orden.length!==ok.length){fb.textContent="⚠️ Aún faltan etapas.";return}fb.textContent=orden.every((x,i)=>x===ok[i])?"✅ ¡Correcto! El proceso va desde la siembra hasta la taza final.":"❌ Hay etapas fuera de lugar. Vuelvan a intentarlo.";};
document.getElementById("ak2Reset").onclick=init;
init();
})();
</script>

  </main>
</body>
</html>
