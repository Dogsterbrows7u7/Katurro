<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evaluación: Mini Katurro - Katurro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #FFF2DC;
      color: #4A1513;
      font-family: 'Poppins', Arial, sans-serif;
    }

    .katurro-top {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 0;
    }

    .volver-actividades {
      display: inline-block;
      text-decoration: none;
      background: #7B1E1E;
      color: #fff;
      padding: 10px 18px;
      border-radius: 14px;
      font-weight: 800;
      box-shadow: 0 6px 14px rgba(74, 21, 19, 0.18);
      transition: 0.25s ease;
    }

    .volver-actividades:hover {
      background: #4A1513;
      color: #fff;
      transform: translateY(-2px);
    }

    .titulo-actividad-individual {
      text-align: center;
      margin: 24px auto 8px;
    }

    .titulo-actividad-individual span {
      color: #D8A45F;
      font-size: 0.85rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .titulo-actividad-individual h1 {
      font-family: 'Playfair Display', serif;
      color: #4A1513;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      margin: 8px 0 0;
    }

    main.container {
      max-width: 1100px;
      padding-bottom: 50px;
    }
  </style>
</head>
<body>
  <div class="katurro-top">
    <a class="volver-actividades" href="../actividades.html">← Volver a Actividades</a>

    <div class="titulo-actividad-individual">
      <span>Actividad interactiva</span>
      <h1>Evaluación: Mini Katurro</h1>
    </div>
  </div>

  <main class="container my-5">
<!-- ACTIVIDAD 11: MINI EVALUACIÓN KATURRO -->
<style>
.ak11-section{margin-top:4rem;padding:2.3rem;border-radius:28px;background:#FBEED7;box-shadow:0 12px 30px rgba(74,21,19,.16);font-family:'Poppins',Arial,sans-serif}
.ak11-header{text-align:center;max-width:850px;margin:0 auto 2rem}
.ak11-header h2{color:#4A1513;font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:800}
.ak11-card{background:#fff;border-radius:22px;padding:1.5rem;border-left:8px solid #6F1D1B;color:#4A1513}
.ak11-question{font-size:1.25rem;font-weight:900;color:#4A1513}
.ak11-options{display:grid;gap:.8rem;margin-top:1rem}
.ak11-options button,.ak11-next{background:#FFF8EA;color:#4A1513;border:2px solid #D8B982;border-radius:14px;padding:.85rem;font-weight:900;cursor:pointer;text-align:left}
.ak11-options button:hover{background:#f3d7a7}
.ak11-options button.good{background:#e9ffe9;border-color:#237a2a}
.ak11-options button.bad{background:#ffe8e8;border-color:#a01818}
.ak11-next{background:#6F1D1B;color:#fff;text-align:center;margin-top:1rem;border:none}
.ak11-feedback{margin-top:1rem;background:#FFF8EA;border-radius:14px;padding:1rem;font-weight:900}
.ak11-score{margin-top:1rem;color:#6F1D1B;font-weight:900}
</style>

<section class="ak11-section" id="mini-evaluacion-katurro">
  <div class="ak11-header">
    <h2>🎯 Mini evaluación Katurro</h2>
    <p>Responde preguntas mezcladas sobre el proceso del café y la página web en HTML.</p>
  </div>
  <div class="ak11-card">
    <div class="ak11-question" id="ak11Pregunta"></div>
    <div class="ak11-options" id="ak11Opciones"></div>
    <div class="ak11-feedback" id="ak11Feedback">Elige una respuesta.</div>
    <button class="ak11-next" id="ak11Next">Siguiente</button>
    <div class="ak11-score">Puntaje: <span id="ak11Score">0</span></div>
  </div>
</section>

<script>
(function(){
const preguntas=[
{q:"¿Qué etapa ocurre después de recolectar los frutos maduros?",o:["Lavado o beneficio","Tostión inmediata","Servir en taza"],r:0,e:"Después de cosechar, el café pasa por procesos de beneficio como despulpado y lavado."},
{q:"¿Qué etiqueta sirve para mostrar una imagen del café?",o:["<img>","<p>","<button>"],r:0,e:"La etiqueta <img> inserta imágenes en la página."},
{q:"¿Por qué se seca el café?",o:["Para reducir humedad y conservar mejor el grano","Para convertirlo en jugo","Para cambiarlo por chocolate"],r:0,e:"El secado ayuda a evitar deterioro y conservar la calidad."},
{q:"¿Qué hace la etiqueta <p>?",o:["Agrega un párrafo o texto","Inserta una imagen","Crea la pestaña del navegador"],r:0,e:"La etiqueta <p> se usa para texto o párrafos."},
{q:"¿Qué proceso desarrolla aroma, color y sabor en el grano?",o:["Tostión","Siembra","Lavado"],r:0,e:"La tostión transforma el grano y desarrolla aroma y sabor."}
];
let i=0,score=0,answered=false;
const q=document.getElementById("ak11Pregunta"),ops=document.getElementById("ak11Opciones"),fb=document.getElementById("ak11Feedback"),sc=document.getElementById("ak11Score");
function load(){answered=false;q.textContent=preguntas[i].q;ops.innerHTML="";fb.textContent="Elige una respuesta.";preguntas[i].o.forEach((op,idx)=>{const b=document.createElement("button");b.textContent=op;b.onclick=()=>check(idx,b);ops.appendChild(b);});}
function check(idx,b){if(answered)return;answered=true;[...ops.children].forEach((x,k)=>{x.disabled=true;if(k===preguntas[i].r)x.classList.add("good");});if(idx===preguntas[i].r){score++;sc.textContent=score;fb.textContent="✅ "+preguntas[i].e;}else{b.classList.add("bad");fb.textContent="❌ "+preguntas[i].e;}}
document.getElementById("ak11Next").onclick=()=>{i++;if(i>=preguntas.length){fb.textContent="🏁 Terminaste. Puntaje final: "+score+" de "+preguntas.length+".";i=0;score=0;sc.textContent=0;}else load();};
load();
})();
</script>

  </main>
</body>
</html>
