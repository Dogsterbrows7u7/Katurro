<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reto: Clasifica Elementos - Katurro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #FFF2DC;
      color: #4A1513;
      font-family: 'Poppins', Arial, sans-serif;
    }

    .katurro-top {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 0;
    }

    .volver-actividades {
      display: inline-block;
      text-decoration: none;
      background: #7B1E1E;
      color: #fff;
      padding: 10px 18px;
      border-radius: 14px;
      font-weight: 800;
      box-shadow: 0 6px 14px rgba(74, 21, 19, 0.18);
      transition: 0.25s ease;
    }

    .volver-actividades:hover {
      background: #4A1513;
      color: #fff;
      transform: translateY(-2px);
    }

    .titulo-actividad-individual {
      text-align: center;
      margin: 24px auto 8px;
    }

    .titulo-actividad-individual span {
      color: #D8A45F;
      font-size: 0.85rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .titulo-actividad-individual h1 {
      font-family: 'Playfair Display', serif;
      color: #4A1513;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      margin: 8px 0 0;
    }

    main.container {
      max-width: 1100px;
      padding-bottom: 50px;
    }
  </style>
</head>
<body>
  <div class="katurro-top">
    <a class="volver-actividades" href="../actividades.html">← Volver a Actividades</a>

    <div class="titulo-actividad-individual">
      <span>Actividad interactiva</span>
      <h1>Reto: Clasifica Elementos</h1>
    </div>
  </div>

  <main class="container my-5">
<style>
.ak-section{margin-top:4rem;padding:2.3rem;border-radius:28px;background:linear-gradient(135deg,#FBEED7,#FFF8EA);box-shadow:0 12px 30px rgba(74,21,19,.18);border:2px solid rgba(111,29,27,.18);font-family:'Poppins',Arial,sans-serif;color:#4A1513}
.ak-section h2{font-family:'Playfair Display',serif;font-weight:800;color:#4A1513;font-size:2.25rem;text-align:center}
.ak-section p{line-height:1.6}
.ak-intro{text-align:center;max-width:820px;margin:0 auto 1.6rem;color:#5f4b3f}
.ak-card{background:#fff;border-radius:22px;padding:1.4rem;border-left:8px solid #6F1D1B}
.ak-code{background:#24110f;color:#ffe9bf;padding:1rem;border-radius:14px;overflow-x:auto;border:2px solid #6F1D1B}
.ak-btn{background:#6F1D1B;color:#fff;border:none;border-radius:13px;padding:.8rem 1rem;font-weight:800;cursor:pointer;margin:.3rem}
.ak-btn:hover{background:#4A1513;transform:translateY(-1px)}
.ak-option{background:#FBEED7;color:#4A1513;border:2px solid #D8B982;border-radius:13px;padding:.8rem;margin:.35rem;font-weight:750;cursor:pointer;text-align:left}
.ak-option:hover{background:#f3d7a7}
.ak-option.correct{background:#9be7a0;border-color:#237a2a}
.ak-option.wrong{background:#ffb3b3;border-color:#a01818}
.ak-feedback{margin-top:1rem;background:#FFF8EA;border-radius:14px;padding:1rem;font-weight:800;color:#4A1513;min-height:40px}
.ak-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.ak-box{background:#fff;border:2px solid #E4C79B;border-radius:18px;padding:1rem;min-height:170px}
.ak-chip{display:inline-block;background:#FFF8EA;border:2px solid #D8B982;border-radius:12px;padding:.65rem .8rem;margin:.35rem;font-weight:800;cursor:pointer}
.ak-chip:hover{background:#f3d7a7}
@media(max-width:768px){.ak-grid{grid-template-columns:1fr}.ak-section{padding:1.3rem}.ak-section h2{font-size:1.7rem}}
</style>

<section class="ak-section" id="clasifica-elementos-html">
  <h2>🧺 Clasifica los elementos HTML</h2>
  <p class="ak-intro">Haz clic en un elemento y luego en la caja donde debe ir.</p>
  <div class="ak-box"><h3>Elementos</h3><div id="ak5Items"></div></div>
  <div class="ak-grid">
    <div class="ak-box ak5bin" data-type="visual"><h3>Se ve en la página</h3><div></div></div>
    <div class="ak-box ak5bin" data-type="interno"><h3>Información interna o estructura</h3><div></div></div>
  </div>
  <button class="ak-btn" id="ak5Revisar">Revisar</button>
  <button class="ak-btn" id="ak5Reset">Reiniciar</button>
  <div class="ak-feedback" id="ak5Feedback">Selecciona un elemento.</div>
</section>
<script>
(function(){
const data=[["<h1>Título</h1>","visual"],["<p>Texto</p>","visual"],['<img src="cafe.jpg">',"visual"],["<button>Ver más</button>","visual"],["<title>Katurro</title>","interno"],['<meta charset="UTF-8">',"interno"],["<head>...</head>","interno"],['<link rel="stylesheet">',"interno"]];
let sel=null;const items=document.getElementById("ak5Items"),fb=document.getElementById("ak5Feedback"),bins=document.querySelectorAll(".ak5bin");
function make(x,t){let s=document.createElement("span");s.className="ak-chip";s.textContent=x;s.dataset.type=t;s.onclick=()=>{document.querySelectorAll("#clasifica-elementos-html .ak-chip").forEach(e=>e.style.outline="none");sel=s;s.style.outline="4px solid #6F1D1B"};return s}
function init(){items.innerHTML="";bins.forEach(b=>b.querySelector("div").innerHTML="");data.sort(()=>Math.random()-.5).forEach(d=>items.appendChild(make(d[0],d[1])));fb.textContent="Selecciona un elemento."}
bins.forEach(bin=>bin.onclick=()=>{if(!sel)return;bin.querySelector("div").appendChild(sel);sel.style.outline="none";sel=null});
document.getElementById("ak5Revisar").onclick=()=>{let ok=0,total=0;bins.forEach(bin=>bin.querySelectorAll(".ak-chip").forEach(it=>{total++;if(it.dataset.type===bin.dataset.type){ok++;it.style.background="#e9ffe9"}else it.style.background="#ffe8e8"}));fb.textContent=ok===data.length?"✅ ¡Todo correcto!":"☕ Correctas: "+ok+" de "+data.length+".";};
document.getElementById("ak5Reset").onclick=init;init();
})();
</script>

  </main>
</body>
</html>
