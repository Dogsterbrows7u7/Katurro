<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reto: Corrige el Código - Katurro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #FFF2DC;
      color: #4A1513;
      font-family: 'Poppins', Arial, sans-serif;
    }

    .katurro-top {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 18px 0;
    }

    .volver-actividades {
      display: inline-block;
      text-decoration: none;
      background: #7B1E1E;
      color: #fff;
      padding: 10px 18px;
      border-radius: 14px;
      font-weight: 800;
      box-shadow: 0 6px 14px rgba(74, 21, 19, 0.18);
      transition: 0.25s ease;
    }

    .volver-actividades:hover {
      background: #4A1513;
      color: #fff;
      transform: translateY(-2px);
    }

    .titulo-actividad-individual {
      text-align: center;
      margin: 24px auto 8px;
    }

    .titulo-actividad-individual span {
      color: #D8A45F;
      font-size: 0.85rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .titulo-actividad-individual h1 {
      font-family: 'Playfair Display', serif;
      color: #4A1513;
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 800;
      margin: 8px 0 0;
    }

    main.container {
      max-width: 1100px;
      padding-bottom: 50px;
    }
  </style>
</head>
<body>
  <div class="katurro-top">
    <a class="volver-actividades" href="../actividades.html">← Volver a Actividades</a>

    <div class="titulo-actividad-individual">
      <span>Actividad interactiva</span>
      <h1>Reto: Corrige el Código</h1>
    </div>
  </div>

  <main class="container my-5">
<style>
.ak-section{margin-top:4rem;padding:2.3rem;border-radius:28px;background:linear-gradient(135deg,#FBEED7,#FFF8EA);box-shadow:0 12px 30px rgba(74,21,19,.18);border:2px solid rgba(111,29,27,.18);font-family:'Poppins',Arial,sans-serif;color:#4A1513}
.ak-section h2{font-family:'Playfair Display',serif;font-weight:800;color:#4A1513;font-size:2.25rem;text-align:center}
.ak-section p{line-height:1.6}
.ak-intro{text-align:center;max-width:820px;margin:0 auto 1.6rem;color:#5f4b3f}
.ak-card{background:#fff;border-radius:22px;padding:1.4rem;border-left:8px solid #6F1D1B}
.ak-code{background:#24110f;color:#ffe9bf;padding:1rem;border-radius:14px;overflow-x:auto;border:2px solid #6F1D1B}
.ak-btn{background:#6F1D1B;color:#fff;border:none;border-radius:13px;padding:.8rem 1rem;font-weight:800;cursor:pointer;margin:.3rem}
.ak-btn:hover{background:#4A1513;transform:translateY(-1px)}
.ak-option{background:#FBEED7;color:#4A1513;border:2px solid #D8B982;border-radius:13px;padding:.8rem;margin:.35rem;font-weight:750;cursor:pointer;text-align:left}
.ak-option:hover{background:#f3d7a7}
.ak-option.correct{background:#9be7a0;border-color:#237a2a}
.ak-option.wrong{background:#ffb3b3;border-color:#a01818}
.ak-feedback{margin-top:1rem;background:#FFF8EA;border-radius:14px;padding:1rem;font-weight:800;color:#4A1513;min-height:40px}
.ak-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.ak-box{background:#fff;border:2px solid #E4C79B;border-radius:18px;padding:1rem;min-height:170px}
.ak-chip{display:inline-block;background:#FFF8EA;border:2px solid #D8B982;border-radius:12px;padding:.65rem .8rem;margin:.35rem;font-weight:800;cursor:pointer}
.ak-chip:hover{background:#f3d7a7}
@media(max-width:768px){.ak-grid{grid-template-columns:1fr}.ak-section{padding:1.3rem}.ak-section h2{font-size:1.7rem}}
</style>

<section class="ak-section" id="reto-cafetero-corregir">
  <h2>☕ Reto del Cafetero: corrige el código</h2>
  <p class="ak-intro">Observa el fragmento HTML con error, elige la corrección adecuada y explica qué estaba pasando.</p>
  <div class="ak-card">
    <h3 id="ak1Pregunta"></h3>
    <pre class="ak-code"><code id="ak1Codigo"></code></pre>
    <div id="ak1Opciones"></div>
    <div class="ak-feedback" id="ak1Feedback">Selecciona una respuesta.</div>
    <button class="ak-btn" id="ak1Next">Siguiente error</button>
    <strong style="margin-left:1rem;">Puntaje: <span id="ak1Score">0</span>/<span id="ak1Total">0</span></strong>
  </div>
</section>
<script>
(function(){
const data=[
["La imagen del proceso no aparece.",'<img scr="../assets/images/proceso.png" alt="Proceso del café">',["Cambiar scr por src","Cambiar img por image","Borrar alt"],0,"El atributo correcto para la ruta de imagen es src."],
["El título no está bien cerrado.","<h3>Lavado y secado</p>",["<h3>Lavado y secado</h3>","<p>Lavado y secado</h3>","<img>Lavado y secado</img>"],0,"Si abre con h3, debe cerrar con /h3."],
["El párrafo está mal cerrado.","<p>El café se seca al sol.</h2>",["<h2>El café se seca al sol.</h2>","<p>El café se seca al sol.</p>","<button>El café se seca al sol.</button>"],1,"Un párrafo debe cerrar con /p."],
["El botón no aparece como botón.","<buton>Jugar Ahora</buton>",["La etiqueta button está mal escrita","El texto está mal","Debe ser una imagen"],0,"La etiqueta correcta es button."],
["El título y el texto están desordenados.","<p>Trilla y clasificación</p>\n<h3>Preparación para el mercado</h3>",["<h3>Trilla y clasificación</h3>\n<p>Preparación para el mercado.</p>","<img>Trilla y clasificación</img>","<p>Trilla y clasificación</h3>"],0,"El título va en h3 y la explicación en p."]
];
let i=0,score=0,answered=false;
const q=document.getElementById("ak1Pregunta"),c=document.getElementById("ak1Codigo"),op=document.getElementById("ak1Opciones"),fb=document.getElementById("ak1Feedback"),sc=document.getElementById("ak1Score"),tot=document.getElementById("ak1Total"),next=document.getElementById("ak1Next");
tot.textContent=data.length;
function load(){answered=false;q.textContent=data[i][0];c.textContent=data[i][1];fb.textContent="Selecciona una respuesta.";op.innerHTML="";data[i][2].forEach((x,k)=>{let b=document.createElement("button");b.className="ak-option";b.textContent=x;b.onclick=()=>check(k,b);op.appendChild(b);});next.textContent=i===data.length-1?"Ver resultado":"Siguiente error";}
function check(k,b){if(answered)return;answered=true;op.querySelectorAll("button").forEach((btn,idx)=>{btn.disabled=true;if(idx===data[i][3])btn.classList.add("correct")});if(k===data[i][3]){score++;sc.textContent=score;fb.textContent="✅ "+data[i][4]}else{b.classList.add("wrong");fb.textContent="❌ "+data[i][4]}}
next.onclick=()=>{if(i<data.length-1){i++;load()}else{fb.textContent=score>=4?"🏆 Excelente. Detectaron la mayoría de errores.":"☕ Buen intento. Repasen etiquetas, cierres y atributos.";i=0;score=0;sc.textContent=0;load();}};
load();
})();
</script>

  </main>
</body>
</html>
